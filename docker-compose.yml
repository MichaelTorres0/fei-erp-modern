services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: fei_erp
      POSTGRES_USER: fei_erp
      POSTGRES_PASSWORD: fei_erp_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  web:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.dev
      POSTGRES_HOST: db
      POSTGRES_DB: fei_erp
      POSTGRES_USER: fei_erp
      POSTGRES_PASSWORD: fei_erp_dev
    depends_on:
      - db
      - redis

volumes:
  postgres_data:
